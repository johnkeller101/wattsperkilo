# Site
name: 'Watts Per Kilo'
title: 'Watts Per Kilo'
title_separator: '-'
description: 'The latest news, product reviews, builds, and ideas from the weight weenie cycling mindset'
logo: 'assets/images/logo.jpg'
favicon: 'assets/images/favicon.ico'
baseurl: ''
# disqus: 'wattsperkilo'

# Cusdis Comments
cusdis:
  app_id: 'd2784f1e-08bd-44d3-9279-9c9832853d4b'
# uncomment to enable mailchimp
# mailchimp-list: 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'

include: ["_pages"]
permalink: /:title/

url: "https://wattsperkilo.cc" # the base hostname & protocol for your site

# Plugins
plugins: 
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag
  
authors:
    john:
      name:           John
      site:           #
      avatar:         assets/images/avatar.jpg
      bio:            "Retired road/gravel racer who likes to ride fast uphill on the fastest equipment available"
      twitter:        https://strava.com/pros/johnkeller
 
# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: john
      avatar: assets/images/avatar.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 9

# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]