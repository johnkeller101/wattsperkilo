---
layout: default
---

<h1 class="title">{{ page.title }}</h1>

{% if page.image %}
<img src="{% if page.image contains "://" %}{{ page.image }}{% else %}{{ site.baseurl }}/{{ page.image }}{% endif %}" alt="{{ page.title }}">
{% endif %}

<div class="page-content">
    {{ content }}
</div>

{% if page.comments == true %}
{% include comments.html %}
{% endif %}
