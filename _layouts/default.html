<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    {% if page.summary %}
    <meta name="description" content="{{ page.summary | strip_html | strip_newlines | truncate: 160 }}" data-pagefind-meta="description">
    <meta property="og:description" content="{{ page.summary | strip_html | strip_newlines | truncate: 200 }}">
    {% endif %}
    {% unless page.image %}
    <meta property="og:image" content="{{ site.baseurl }}/{{ site.logo }}">
    {% endunless %}

    <link rel="shortcut icon" type="image/x-icon" href="{{site.baseurl}}/{{site.favicon}}">
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/theme.css">

    {% include tracking-header.html %}
</head>

<body>
    <header>
        <nav>
            <h2><a href="{{ site.baseurl }}/">{{ site.name }}</a></h2>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-links">
                <a href="{{ site.baseurl }}/categories">Categories</a>
                <a href="{{ site.baseurl }}/about">About</a>
                <a href="{{ site.baseurl }}/privacy-policy">Privacy</a>
            </div>
            <div class="social-links">
                <a href="https://www.strava.com/athletes/johnkeller" target="_blank" title="Strava">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169"/></svg>
                </a>
            </div>
        </div>
    </footer>

    <script src="{{site.baseurl}}/assets/js/lunr.js"></script>
    {% include search-script.html %}
    <script src="{{site.baseurl}}/assets/js/theme.js"></script>

    {% include tracking-footer.html %}
</body>
</html>
