<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% seo %}
    {% if page.summary %}
    <meta name="description" content="{{ page.summary | strip_html | strip_newlines | truncate: 160 }}" data-pagefind-meta="description">
    <meta property="og:description" content="{{ page.summary | strip_html | strip_newlines | truncate: 200 }}">
    {% endif %}

    <link rel="shortcut icon" type="image/x-icon" href="{{site.baseurl}}/{{site.favicon}}">

    <!-- Bootstrap 5 with Bootswatch Zephyr Theme -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/bootstrap-icons.min.css">

    <!-- Minimal Custom Styles -->
    <link rel="stylesheet" href="{{site.baseurl}}/assets/css/theme.css">

    {% include tracking-header.html %}
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ site.baseurl }}/">
                {{ site.name }}
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    {% include menu-header.html %}
                </ul>
                <div class="d-flex">
                    {% include search-form.html %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Search Results Modal -->
    <div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="searchModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="searchModalLabel">Search Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="searchResultsList" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Content -->
    <main class="py-4">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="bg-body-tertiary border-top py-4 mt-auto">
        <div class="container">
            <div class="d-flex flex-wrap justify-content-between align-items-center">
                <p class="mb-0 text-body-secondary">
                    <strong>{{ site.name }}</strong> &copy; <script>document.write(new Date().getFullYear())</script>
                </p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="{{site.baseurl}}/assets/js/bootstrap.bundle.min.js"></script>

    <!-- Lunr Search -->
    <script src="{{site.baseurl}}/assets/js/lunr.js"></script>
    {% include search-script.html %}
    <script src="{{site.baseurl}}/assets/js/theme.js"></script>

    {% include tracking-footer.html %}
</body>
</html>
