<script>
{% assign counter = 0 %}
var documents = [{% for page in site.pages %}{% if page.url contains '.xml' or page.url contains 'assets' %}{% else %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "body": "{{ page.content | markdownify | replace: '.', '. ' | replace: '</h2>', ': ' | replace: '</h3>', ': ' | replace: '</h4>', ': ' | replace: '</p>', ' ' | strip_html | strip_newlines | replace: '  ', ' ' | replace: '"', ' ' }}"{% assign counter = counter | plus: 1 %}
    }, {% endif %}{% endfor %}{% for page in site.without-plugin %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "body": "{{ page.content | markdownify | replace: '.', '. ' | replace: '</h2>', ': ' | replace: '</h3>', ': ' | replace: '</h4>', ': ' | replace: '</p>', ' ' | strip_html | strip_newlines | replace: '  ', ' ' | replace: '"', ' ' }}"{% assign counter = counter | plus: 1 %}
    }, {% endfor %}{% for page in site.posts %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "body": "{{ page.date | date: "%Y/%m/%d" }} - {{ page.content | markdownify | replace: '.', '. ' | replace: '</h2>', ': ' | replace: '</h3>', ': ' | replace: '</h4>', ': ' | replace: '</p>', ' ' | strip_html | strip_newlines | replace: '  ', ' ' | replace: '"', ' ' }}"{% assign counter = counter | plus: 1 %}
    }{% if forloop.last %}{% else %}, {% endif %}{% endfor %}{% for page in site.products %}, {
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "body": "{{ page.brand | default: '' }} {{ page.category | default: '' }} {{ page.summary | default: '' | strip_html | strip_newlines | replace: '"', ' ' }} {{ page.content | markdownify | replace: '.', '. ' | replace: '</h2>', ': ' | replace: '</h3>', ': ' | replace: '</h4>', ': ' | replace: '</p>', ' ' | strip_html | strip_newlines | replace: '  ', ' ' | replace: '"', ' ' | truncate: 500 }}"{% assign counter = counter | plus: 1 %}
    }{% endfor %}];

var idx = lunr(function () {
    this.ref('id')
    this.field('title')
    this.field('body')

    documents.forEach(function (doc) {
        this.add(doc)
    }, this)
});

function lunr_search(term) {
    if (!term) return false;

    var searchModal = new bootstrap.Modal(document.getElementById('searchModal'));
    var resultsList = document.getElementById('searchResultsList');
    var modalTitle = document.getElementById('searchModalLabel');

    modalTitle.textContent = "Search results for '" + term + "'";
    resultsList.innerHTML = '';

    var results = idx.search(term);

    if (results.length > 0) {
        results.forEach(function(result) {
            var ref = result.ref;
            var url = documents[ref].url;
            var title = documents[ref].title;
            var body = documents[ref].body.substring(0, 160) + '...';

            var li = document.createElement('li');
            li.className = 'list-group-item';
            li.innerHTML = '<a href="' + url + '" class="text-decoration-none">' +
                '<div class="fw-semibold">' + title + '</div>' +
                '<small class="text-body-secondary">' + body + '</small>' +
                '</a>';
            resultsList.appendChild(li);
        });
    } else {
        resultsList.innerHTML = '<li class="list-group-item text-body-secondary">No results found. Try a different search term.</li>';
    }

    searchModal.show();
    return false;
}
</script>
