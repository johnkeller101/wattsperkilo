<script>
{% assign counter = 0 %}
var documents = [{% for page in site.posts %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "date": "{{ page.date | date: "%B %-d, %Y" }}",
    "body": "{{ page.content | markdownify | replace: '.', '. ' | replace: '</h2>', ': ' | replace: '</h3>', ': ' | replace: '</h4>', ': ' | replace: '</p>', ' ' | strip_html | strip_newlines | replace: '  ', ' ' | replace: '"', ' ' }}"{% assign counter = counter | plus: 1 %}
    }{% if forloop.last %}{% else %}, {% endif %}{% endfor %}];

var idx = lunr(function () {
    this.ref('id')
    this.field('title')
    this.field('body')

    documents.forEach(function (doc) {
        this.add(doc)
    }, this)
});

function lunr_search(term) {
    if (!term) return false;

    var resultsContainer = document.getElementById('searchResults');
    if (!resultsContainer) return false;

    resultsContainer.innerHTML = '';

    var results = idx.search(term);

    if (results.length > 0) {
        results.forEach(function(result) {
            var ref = result.ref;
            var url = documents[ref].url;
            var title = documents[ref].title;
            var date = documents[ref].date;
            var body = documents[ref].body.substring(0, 160) + '...';

            var a = document.createElement('a');
            a.href = url;
            a.innerHTML = '<div class="result-title">' + title + '</div>' +
                '<div class="result-date">' + date + '</div>' +
                '<div class="result-preview">' + body + '</div>';
            resultsContainer.appendChild(a);
        });
    } else {
        resultsContainer.innerHTML = '<p style="color: var(--gray-text);">No results found.</p>';
    }

    resultsContainer.style.display = 'block';
    return false;
}

document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('lunrsearch');
    if (input) {
        input.addEventListener('input', function() {
            if (!this.value) {
                var resultsContainer = document.getElementById('searchResults');
                if (resultsContainer) {
                    resultsContainer.style.display = 'none';
                    resultsContainer.innerHTML = '';
                }
            }
        });
    }
});
</script>
