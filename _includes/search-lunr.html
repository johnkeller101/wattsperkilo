<script>
{% assign counter = 0 %}
var documents = [{% for page in site.pages %}{% if page.url contains '.xml' or page.url contains 'assets' %}{% else %}{% if page.description %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "body": "{{ page.description | replace: '"', ' ' }}"{% assign counter = counter | plus: 1 %}
    }, {% endif %}{% endif %}{% endfor %}{% for page in site.posts %}{
    "id": {{ counter }},
    "url": "{{ site.url }}{{site.baseurl}}{{ page.url }}",
    "title": "{{ page.title }}",
    "body": "{{ page.summary | default: page.excerpt | strip_html | strip_newlines | replace: '"', ' ' | truncate: 300 }}",
    "categories": "{{ page.categories | join: ' ' }}",
    "date": "{{ page.date | date: '%B %-d, %Y' }}"{% assign counter = counter | plus: 1 %}
    }{% if forloop.last %}{% else %}, {% endif %}{% endfor %}];

var idx = lunr(function () {
    this.ref('id')
    this.field('title')
    this.field('body')
    this.field('categories')

    documents.forEach(function (doc) {
        this.add(doc)
    }, this)
});

function lunr_search(term) {
    if (!term) return false;

    var searchModal = new bootstrap.Modal(document.getElementById('searchModal'));
    var resultsList = document.getElementById('searchResultsList');
    var modalTitle = document.getElementById('searchModalLabel');

    modalTitle.textContent = "Search results for '" + term + "'";
    resultsList.innerHTML = '';

    var results = idx.search(term);

    if (results.length > 0) {
        results.forEach(function(result) {
            var ref = result.ref;
            var url = documents[ref].url;
            var title = documents[ref].title;
            var body = documents[ref].body.substring(0, 160) + '...';
            var date = documents[ref].date || '';

            var li = document.createElement('li');
            li.className = 'list-group-item';
            li.innerHTML = '<a href="' + url + '" class="text-decoration-none">' +
                '<div class="fw-semibold">' + title + '</div>' +
                (date ? '<small class="text-body-secondary me-2">' + date + '</small>' : '') +
                '<small class="text-body-secondary">' + body + '</small>' +
                '</a>';
            resultsList.appendChild(li);
        });
    } else {
        resultsList.innerHTML = '<li class="list-group-item text-body-secondary">No results found. Try a different search term.</li>';
    }

    searchModal.show();
    return false;
}
</script>

<form class="d-flex" role="search" onsubmit="return lunr_search(document.getElementById('lunrsearch').value);">
    <input class="form-control me-2" type="search" id="lunrsearch" placeholder="Search..." aria-label="Search">
    <button class="btn btn-outline-primary" type="submit"><i class="bi bi-search"></i></button>
</form>
